    <!-- Background stuff -->

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>

        /*My very own config YAY, fiddle with everything in here, nothing below
            These are basically the basic tweaks*/
        const CONFIG = {
        // Gradient colors it slowly drifts between (hex, as 0xRRGGBB)
        gradientColors: [
            0x1C1B43,
            0x864996,
            0xCC7D9B,
        ],
        gradientSpeed: 0.7,     // lower means slower

        // Cube appearance
        cubeColors: [0xff6b81, 0x6bc6ff, 0xffe27a, 0xa78bfa],
        cubeSize: 0.8,
        cubeMinCount: 15,
        cubeMaxCount: 20,
        cubeEdgeMargin: 0.30,    // 0.xx = cubes stay within the outer xx% band of each edge
        cubeRotationSpeed: 0.8,  // radians/sec roughly
        cubeWireframe: false,
        };

        /* 
        ok OKAY LOCK IN
        ============================================================
        
        */

        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // ---------- Gradient background plane ----------
        // A full-screen quad behind everything, using a shader that
        // blends between CONFIG.gradientColors over time.
        const gradientUniforms = {
        uTime: { value: 0 },
        uColorA: { value: new THREE.Color(CONFIG.gradientColors[0]) },
        uColorB: { value: new THREE.Color(CONFIG.gradientColors[1]) },
        uColorC: { value: new THREE.Color(CONFIG.gradientColors[2]) },
        };

        const gradientMaterial = new THREE.ShaderMaterial({
        uniforms: gradientUniforms,
        depthWrite: false,
        vertexShader: `
            varying vec2 vUv;
            void main() {
            vUv = uv;
            gl_Position = vec4(position.xy, 1.0, 1.0);
            }
        `,
        fragmentShader: `
            varying vec2 vUv;
            uniform float uTime;
            uniform vec3 uColorA;
            uniform vec3 uColorB;
            uniform vec3 uColorC;

            void main() {

            float mixA = sin(uTime * 0.3) * 0.5 + 0.5;
            float mixB = sin(uTime * 0.3 + 2.0) * 0.5 + 0.5;

            vec3 base = mix(uColorA, uColorB, vUv.y + mixA * 0.3);
            vec3 finalColor = mix(base, uColorC, vUv.x * 0.4 + mixB * 0.2);

            gl_FragColor = vec4(finalColor, 1.0);
            }
        `,
        });

        // A quad big enough to fill the screen regardless of aspect ratio,
        // rendered with its own always-facing-camera trick (position set in clip space above).
        const gradientGeo = new THREE.PlaneGeometry(2, 2);
        const gradientMesh = new THREE.Mesh(gradientGeo, gradientMaterial);
        gradientMesh.frustumCulled = false;
        gradientMesh.renderOrder = -1;
        scene.add(gradientMesh);

        // ---------- Lighting ----------
        scene.add(new THREE.AmbientLight(0x8a6cc4, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(3, 5, 4);
        scene.add(dirLight);

        // ---------- Cubes, spawned near the edges only ----------
        const cubes = [];

        function visibleSizeAtZ(z) {
        // figures out how tall/wide the view is at a given z distance,
        // so we can place cubes in world units relative to the actual screen edges.
        const distance = camera.position.z - z;
        const vFOV = (camera.fov * Math.PI) / 180;
        const height = 2 * Math.tan(vFOV / 2) * distance;
        const width = height * camera.aspect;
        return { width, height };
        }

        function randomEdgePosition() {
        const z = (Math.random() - 0.5) * 3; // slight depth variance
        const { width, height } = visibleSizeAtZ(z);
        const halfW = width / 2;
        const halfH = height / 2;
        const margin = CONFIG.cubeEdgeMargin;

        // pick one of 4 edges, then a random spot within that edge's outer band.
        const edge = Math.floor(Math.random() * 4);
        let x, y;

        if (edge === 0) { // left band
            x = -halfW + Math.random() * (halfW * margin);
            y = (Math.random() - 0.5) * height;
        } else if (edge === 1) { // right band
            x = halfW - Math.random() * (halfW * margin);
            y = (Math.random() - 0.5) * height;
        } else if (edge === 2) { // top band
            x = (Math.random() - 0.5) * width;
            y = halfH - Math.random() * (halfH * margin);
        } else { // bottom band
            x = (Math.random() - 0.5) * width;
            y = -halfH + Math.random() * (halfH * margin);
        }

        return new THREE.Vector3(x, y, z);
        }

        function spawnCubes() {
        cubes.forEach(c => scene.remove(c.mesh));
        cubes.length = 0;

        const count = CONFIG.cubeMinCount + Math.floor(Math.random() * (CONFIG.cubeMaxCount - CONFIG.cubeMinCount + 1));

        for (let i = 0; i < count; i++) {
            const color = CONFIG.cubeColors[Math.floor(Math.random() * CONFIG.cubeColors.length)];
            const geo = new THREE.BoxGeometry(CONFIG.cubeSize, CONFIG.cubeSize, CONFIG.cubeSize);
            const mat = new THREE.MeshStandardMaterial({
            color,
            wireframe: CONFIG.cubeWireframe,
            roughness: 0.5,
            metalness: 0.1,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(randomEdgePosition());
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            scene.add(mesh);

            cubes.push({
            mesh,
            rotSpeed: new THREE.Vector3(
                (Math.random() - 0.5) * CONFIG.cubeRotationSpeed,
                (Math.random() - 0.5) * CONFIG.cubeRotationSpeed,
                (Math.random() - 0.5) * CONFIG.cubeRotationSpeed
            ),
            });
        }
        }

        spawnCubes();

        // Re-roll cube count/positions every time the page reloads.
        // If you want a fresh layout periodically instead, uncomment:
        setInterval(spawnCubes, 20000);

        // ---------- Animation loop ----------
        const clock = new THREE.Clock();

        function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        gradientUniforms.uTime.value = elapsed * CONFIG.gradientSpeed * 10;

        cubes.forEach(c => {
            c.mesh.rotation.x += c.rotSpeed.x * delta;
            c.mesh.rotation.y += c.rotSpeed.y * delta;
            c.mesh.rotation.z += c.rotSpeed.z * delta;
        });

        renderer.render(scene, camera);
        }
        animate();

        // ---------- Resize handling ----------
        window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
